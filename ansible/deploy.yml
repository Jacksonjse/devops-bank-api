---
- name: Deploy Bank API with Docker
  hosts: all
  become: true

  vars:
    docker_image: "bank-api:latest"
    container_name: "bank-api"
    app_port: 5000
    project_path: "/media/jackson/Windows-SSD/Users/Jackson Jesse/Desktop/DEVOPS PROJECT"

  tasks:
    # ── Deploy Application ─────────────────────────────────────────────
    - name: Build or pull Docker image
      shell: |
        # Build from project directory
        if [ -f {{ project_path }}/Dockerfile ]; then
          docker build -t {{ docker_image }} {{ project_path }}
        else
          echo "Dockerfile not found at {{ project_path }}"
        fi

    - name: Stop existing container (if running)
      shell: |
        docker stop {{ container_name }} 2>/dev/null || true
        docker rm {{ container_name }} 2>/dev/null || true

    - name: Run Bank API container
      shell: |
        docker run -d \
          --name {{ container_name }} \
          --restart unless-stopped \
          -p {{ app_port }}:5000 \
          -v bank-data:/data \
          {{ docker_image }}

    - name: Wait for container to start
      pause:
        seconds: 2

    - name: Verify container is running
      shell: docker ps --filter "name={{ container_name }}" --format "table {%raw%}{{.ID}}\t{{.Status}}{%endraw%}"
      register: container_status

    - name: Print container status
      debug:
        msg: "Container status:\n{{ container_status.stdout }}"
