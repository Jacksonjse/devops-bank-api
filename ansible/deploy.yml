---
- name: Deploy Bank API with Docker
  hosts: all
  become: true

  vars:
    docker_image: "your-dockerhub-username/bank-api:latest"
    container_name: "bank-api"
    app_port: 5000

  tasks:
    # ── Install Docker ─────────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: yes

    # ── Deploy Application ─────────────────────────────────────────────
    - name: Pull latest Docker image
      community.docker.docker_image:
        name: "{{ docker_image }}"
        source: pull
        force_source: yes

    - name: Stop existing container (if running)
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: absent

    - name: Run Bank API container
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ docker_image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ app_port }}:5000"
        volumes:
          - bank-data:/data

    - name: Verify container is running
      command: docker ps --filter "name={{ container_name }}" --format "{{ '{{' }}.Status{{ '}}' }}"
      register: container_status

    - name: Print container status
      debug:
        msg: "Container status: {{ container_status.stdout }}"
