version: "3.9"

services:
  bank-api:
    build: .
    container_name: bank-api
    ports:
      - "5000:5000"
    environment:
      - DB_PATH=/data/bank.db
    volumes:
      - bank-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  bank-data:
